name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libxml2-dev \
            libssl-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff-dev \
            libjpeg-dev \
            libharfbuzz-dev \
            libfribidi-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: Install pak
        run: |
          Rscript -e 'install.packages("pak", repos = "https://r-lib.github.io/p/pak/stable/")'

      - name: Install R dependencies
        run: |
          Rscript -e '
            pak::pak(c(
              "devtools",
              "testthat",
              "withr",
              "R6",
              "S7",
              "cli",
              "rlang",
              "jsonlite",
              "callr",
              "processx",
              "base64enc",
              "openssl"
            ))
          '

      - name: Install ecosystem packages from GitHub
        run: |
          Rscript -e '
            pak::pak(paste0("ian-flores/", c(
              "securer",
              "securetools",
              "secureguard",
              "securecontext",
              "orchestr",
              "securetrace",
              "securebench"
            )))
          '

      - name: Run integration tests
        run: |
          Rscript -e '
            Sys.setenv(NOT_CRAN = "true")
            testthat::test_dir(
              "tests/testthat",
              reporter = "summary",
              stop_on_failure = TRUE
            )
          '
